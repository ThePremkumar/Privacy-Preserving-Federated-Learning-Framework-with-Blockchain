version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: federated_postgres
    environment:
      POSTGRES_DB: federated_learning
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - federated_network
    restart: unless-stopped

  # MongoDB for audit logs
  mongodb:
    image: mongo:7
    container_name: federated_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Set MONGO_PASSWORD in your .env}
      MONGO_INITDB_DATABASE: audit_logs
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - federated_network
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: federated_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - federated_network
    restart: unless-stopped

  # Blockchain Node (Ganache for development)
  blockchain:
    image: trufflesuite/ganache-cli:latest
    container_name: federated_blockchain
    ports:
      - "8545:8545"
    command: >
      ganache-cli
      --host 0.0.0.0
      --port 8545
      --accounts 10
      --defaultBalanceEther 1000
      --mnemonic "${GANACHE_MNEMONIC:-test test test test test test test test test test test junk}"
    volumes:
      - blockchain_data:/ganache-data
    networks:
      - federated_network
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: federated_backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/federated_learning
      - MONGODB_URL=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD}@mongodb:27017/audit_logs?authSource=admin
      - REDIS_URL=redis://redis:6379
      - BLOCKCHAIN_URL=http://blockchain:8545
      - JWT_SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in your .env}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS:-}
      - BLOCKCHAIN_PRIVATE_KEY=${BLOCKCHAIN_PRIVATE_KEY:-}
      - SEED_ADMIN_USERNAME=${SEED_ADMIN_USERNAME:-superadmin}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@your-domain.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD in your .env}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongodb
      - redis
      - blockchain
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    networks:
      - federated_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/status/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: federated_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - federated_network
    restart: unless-stopped

  # Hospital Node 1 (Federated Client)
  hospital_node_1:
    build:
      context: .
      dockerfile: Dockerfile.hospital
    container_name: hospital_node_1
    environment:
      - HOSPITAL_ID=hospital_001
      - HOSPITAL_NAME=Hospital Node 1
      - SERVER_URL=http://backend:8000
      - DATA_PATH=/app/data/hospital_1
    ports:
      - "8001:8000"
    depends_on:
      - backend
    volumes:
      - ./src/client:/app/src/client
      - ./data/hospital_1:/app/data/hospital_1
    networks:
      - federated_network
    restart: unless-stopped

  # Hospital Node 2 (Federated Client)
  hospital_node_2:
    build:
      context: .
      dockerfile: Dockerfile.hospital
    container_name: hospital_node_2
    environment:
      - HOSPITAL_ID=hospital_002
      - HOSPITAL_NAME=Hospital Node 2
      - SERVER_URL=http://backend:8000
      - DATA_PATH=/app/data/hospital_2
    ports:
      - "8002:8000"
    depends_on:
      - backend
    volumes:
      - ./src/client:/app/src/client
      - ./data/hospital_2:/app/data/hospital_2
    networks:
      - federated_network
    restart: unless-stopped

  # Hospital Node 3 (Federated Client)
  hospital_node_3:
    build:
      context: .
      dockerfile: Dockerfile.hospital
    container_name: hospital_node_3
    environment:
      - HOSPITAL_ID=hospital_003
      - HOSPITAL_NAME=Hospital Node 3
      - SERVER_URL=http://backend:8000
      - DATA_PATH=/app/data/hospital_3
    ports:
      - "8003:8000"
    depends_on:
      - backend
    volumes:
      - ./src/client:/app/src/client
      - ./data/hospital_3:/app/data/hospital_3
    networks:
      - federated_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: federated_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - federated_network
    restart: unless-stopped

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: federated_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - federated_network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: federated_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - federated_network
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  blockchain_data:
  prometheus_data:
  grafana_data:

networks:
  federated_network:
    driver: bridge
